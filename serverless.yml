service: mandarino-content-api
frameworkVersion: "3"

plugins:
  - serverless-iam-roles-per-function
  - serverless-step-functions

package:
  exclude:
    - package-lock.json
    - package.json

custom:
  name: vishal
  stage: ${opt:stage, self:provider.stage}
  logRetentionInDays: 30
  logLevel:
    default: ALL
    prod: ERROR

  appSyncLogLevel:
    default: ALL
    prod: ERROR

  UsersTable:
    Name: ${cf:nomadmethod-api-${self:provider.stage}.UsersTableName}
    Arn: ${cf:nomadmethod-api-${self:provider.stage}.UsersTableArn}

  UserAssetsTable:
    Name: ${cf:nomadmethod-api-${self:provider.stage}.UserAssetsTableName}
    Arn: ${cf:nomadmethod-api-${self:provider.stage}.UserAssetsTableArn}

  AssetsBucket:
    Name: ${cf:nomadmethod-api-${self:provider.stage}.AssetsBucketName}
    Arn: ${cf:nomadmethod-api-${self:provider.stage}.AssetsBucketArn}

  LegacyContentsTable:
    Name: ${cf:nomadmethod-api-${self:provider.stage}.ContentsTableName}
    Arn: ${cf:nomadmethod-api-${self:provider.stage}.ContentsTableArn}

  LegacyContentDetailsTable:
    Name: ${cf:nomadmethod-api-${self:provider.stage}.ContentDetailsTableName}
    Arn: ${cf:nomadmethod-api-${self:provider.stage}.ContentDetailsTableArn}

  CognitoUserPool:
    Arn: ${cf:nomadmethod-api-${self:provider.stage}.CognitoUserPoolArn}
    Id: ${cf:nomadmethod-api-${self:provider.stage}.CognitoUserPoolId}
    ProviderName: ${cf:nomadmethod-api-${self:provider.stage}.CognitoUserPoolProviderName}

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  versionFunctions: false
  region: us-east-1
  memorySize: 512
  eventBridge:
    useCloudFormation: true
  environment:
    SERVICE_NAME: ${self:service}
    STAGE: ${self:provider.stage}
    LOG_LEVEL: ${self:custom.logLevel.${self:provider.stage}, self:custom.logLevel.default}
    USER_ASSETS_TABLE: ${self:custom.UserAssetsTable.Name}

functions:
  add-series:
    handler: functions/series/add-series.handler
    events:
      - http:
          path: /v1/add-series
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      SERIES_CONTENTS_TABLE: !Ref SeriesContentsTableV2
      SOURCE_TABLE: !Ref SourceTable
      USER_ASSETS_TABLE: ${self:custom.UserAssetsTable.Name}

    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource: !GetAtt SourceTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:GetItem
        Resource:
          - !GetAtt SeriesTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - ${self:custom.UserAssetsTable.Arn}
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - ${self:custom.UsersTable.Arn}
              - "index/byEmail"

  update-series:
    handler: functions/series/update-series.handler
    events:
      - http:
          path: /v1/update-series
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      SERIES_CONTENTS_TABLE: !Ref SeriesContentsTableV2
      SOURCE_TABLE: !Ref SourceTable
      USER_ASSETS_TABLE: ${self:custom.UserAssetsTable.Name}
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:UpdateItem
          - dynamodb:GetItem
        Resource:
          - !GetAtt SeriesTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource: !GetAtt SourceTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - ${self:custom.UserAssetsTable.Arn}

  list-series:
    handler: functions/series/list-series.handler
    events:
      - http:
          path: /v1/series
          method: GET
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - !GetAtt SeriesTable.Arn
              - "index/byTopicType"
          - !Join
            - "/"
            - - !GetAtt SeriesTable.Arn
              - "index/bySourceId"
          - !Join
            - "/"
            - - !GetAtt SeriesTable.Arn
              - "index/byUserId"
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - ${self:custom.UsersTable.Arn}
              - "index/byEmail"
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - ${self:custom.UserAssetsTable.Arn}

  get-series-details:
    handler: functions/series/get-series-details.handler
    events:
      - http:
          path: /v1/series/{seriesId}
          method: GET
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      SERIES_CONTENTS_TABLE: !Ref SeriesContentsTableV2
      CONTENT_DETAILS_TABLE: !Ref ContentDetailsTable
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - !GetAtt SeriesTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - !GetAtt SeriesContentsTableV2.Arn
              - "index/bySeriesId"
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - ${self:custom.UsersTable.Arn}
              - "index/byEmail"
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - ${self:custom.UserAssetsTable.Arn}

  add-episodes:
    handler: functions/series/add-episodes.handler
    events:
      - http:
          path: /v1/add-episodes
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      SERIES_CONTENTS_TABLE: !Ref SeriesContentsTableV2
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:GetItem
        Resource:
          - !GetAtt SeriesTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:PutItem
        Resource:
          - !GetAtt SeriesContentsTableV2.Arn

  remove-episodes:
    handler: functions/series/remove-episodes.handler
    events:
      - http:
          path: /v1/remove-episodes
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      SERIES_CONTENTS_TABLE: !Ref SeriesContentsTableV2
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:UpdateItem
          - dynamodb:GetItem
        Resource:
          - !GetAtt SeriesTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:DeleteItem
        Resource:
          - !GetAtt SeriesContentsTableV2.Arn

  port-episodes:
    timeout: 30
    handler: functions/series/port-episodes.handler
    events:
      - http:
          path: /v1/series/{seriesId}/port-episodes
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      SERIES_CONTENTS_TABLE: !Ref SeriesContentsTableV2
      LEGACY_CONTENTS_TABLE: ${self:custom.LegacyContentsTable.Name}
      LEGACY_CONTENT_DETAILS_TABLE: ${self:custom.LegacyContentDetailsTable.Name}
      ASSETS_BUCKET: ${self:custom.AssetsBucket.Name}
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
        Resource:
          - !GetAtt SeriesTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:PutItem
          - dynamodb:Query
        Resource:
          - !GetAtt SeriesContentsTableV2.Arn
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - !GetAtt SeriesContentsTableV2.Arn
              - "index/bySeriesId"
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - ${self:custom.UsersTable.Arn}
              - "index/byEmail"
      - Effect: Allow
        Action:
          - dynamodb:BatchGetItem
          - dynamodb:GetItem
        Resource:
          - ${self:custom.LegacyContentsTable.Arn}
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - ${self:custom.LegacyContentDetailsTable.Arn}
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - ${self:custom.UserAssetsTable.Arn}
      - Effect: Allow
        Action:
          - s3:GetObject
        Resource:
          - ${self:custom.AssetsBucket.Arn}/*

  update-stats:
    handler: functions/series/update-stats.handler
    events:
      - http:
          path: /v1/series/{seriesId}/update-stats
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      SERIES_CONTENTS_TABLE: !Ref SeriesContentsTableV2
      LEGACY_CONTENTS_TABLE: ${self:custom.LegacyContentsTable.Name}
      LEGACY_CONTENT_DETAILS_TABLE: ${self:custom.LegacyContentDetailsTable.Name}
      ASSETS_BUCKET: ${self:custom.AssetsBucket.Name}
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
          - dynamodb:UpdateItem
        Resource:
          - !GetAtt SeriesTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:Query
          - dynamodb:GetItem
        Resource:
          - !GetAtt SeriesContentsTableV2.Arn
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - !GetAtt SeriesContentsTableV2.Arn
              - "index/bySeriesId"
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - ${self:custom.UsersTable.Arn}
              - "index/byEmail"
      - Effect: Allow
        Action:
          - dynamodb:BatchGetItem
          - dynamodb:GetItem
        Resource:
          - ${self:custom.LegacyContentsTable.Arn}
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - ${self:custom.LegacyContentDetailsTable.Arn}
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - ${self:custom.UserAssetsTable.Arn}
      - Effect: Allow
        Action:
          - s3:GetObject
        Resource:
          - ${self:custom.AssetsBucket.Arn}/*

  add-source:
    handler: functions/sources/add-source.handler
    events:
      - http:
          path: /v1/add-source
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SOURCE_TABLE: !Ref SourceTable
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:PutItem
        Resource:
          - !GetAtt SourceTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - ${self:custom.UsersTable.Arn}
              - "index/byEmail"

  update-source:
    handler: functions/sources/update-source.handler
    events:
      - http:
          path: /v1/update-source
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SOURCE_TABLE: !Ref SourceTable
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:UpdateItem
          - dynamodb:GetItem
        Resource:
          - !GetAtt SourceTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - ${self:custom.UsersTable.Arn}
              - "index/byEmail"

  list-sources:
    handler: functions/sources/list-sources.handler
    events:
      - http:
          path: /v1/list-sources
          method: GET
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SOURCE_TABLE: !Ref SourceTable
      USER_ASSETS_TABLE: ${self:custom.UserAssetsTable.Name}
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - !GetAtt SourceTable.Arn
              - "index/byUserId"
          - !Join
            - "/"
            - - !GetAtt SourceTable.Arn
              - "index/bySK"
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - ${self:custom.UsersTable.Arn}
              - "index/byEmail"

  list-enrollments:
    handler: functions/enrollments/list-enrollments.handler
    events:
      - http:
          path: /v1/enrollments
          method: GET
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      ENROLLMENTS_TABLE: !Ref EnrollmentsTable
      SERIES_TABLE: !Ref SeriesTable
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !GetAtt EnrollmentsTable.Arn
          - !Join
            - "/"
            - - !GetAtt EnrollmentsTable.Arn
              - "index/byUserId"
      - Effect: Allow
        Action:
          - dynamodb:BatchGetItem
          - dynamodb:GetItem
        Resource:
          - !GetAtt SeriesTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - ${self:custom.UsersTable.Arn}
              - "index/byEmail"
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - ${self:custom.UserAssetsTable.Arn}

  get-enrollment:
    handler: functions/enrollments/get-enrollment.handler
    events:
      - http:
          path: /v1/enrollments/{enrollmentId}
          method: GET
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      ENROLLMENTS_TABLE: !Ref EnrollmentsTable
      SERIES_TABLE: !Ref SeriesTable
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - !GetAtt EnrollmentsTable.Arn
          - !GetAtt SeriesTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - ${self:custom.UsersTable.Arn}
              - "index/byEmail"
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - ${self:custom.UserAssetsTable.Arn}

  create-enrollment:
    handler: functions/enrollments/create-enrollment.handler
    events:
      - http:
          path: /v1/enrollments
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      ENROLLMENTS_TABLE: !Ref EnrollmentsTable
      SERIES_TABLE: !Ref SeriesTable
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:PutItem
        Resource:
          - !GetAtt EnrollmentsTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:GetItem
        Resource:
          - !GetAtt SeriesTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - ${self:custom.UsersTable.Arn}
              - "index/byEmail"

  delete-enrollment:
    handler: functions/enrollments/delete-enrollment.handler
    events:
      - http:
          path: /v1/enrollments/series/{seriesId}
          method: DELETE
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      ENROLLMENTS_TABLE: !Ref EnrollmentsTable
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:DeleteItem
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - !GetAtt EnrollmentsTable.Arn
              - "index/byUserId"
          - !GetAtt EnrollmentsTable.Arn
      - Effect: Allow
        Action:
          - dynamodb:Query
        Resource:
          - !Join
            - "/"
            - - ${self:custom.UsersTable.Arn}
              - "index/byEmail"
resources:
  Resources:
    SourceTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
        GlobalSecondaryIndexes:
          - IndexName: byUserId
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: id
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: bySk
            KeySchema:
              - AttributeName: sk
                KeyType: HASH
              - AttributeName: id
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        Tags:
          # To keep track of user table for diffeent environment
          - Key: Environment
            Value: ${self:custom.stage}
          - Key: Name
            Value: mandarino-source-table
    SeriesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
          - AttributeName: topicType
            AttributeType: S
          - AttributeName: sourceId
            AttributeType: S
        GlobalSecondaryIndexes:
          - IndexName: byUserId
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: id
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: byTopicType
            KeySchema:
              - AttributeName: topicType
                KeyType: HASH
              - AttributeName: id
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: bySourceId
            KeySchema:
              - AttributeName: sourceId
                KeyType: HASH
              - AttributeName: id
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        Tags:
          - Key: Environment
            Value: ${self:custom.stage}
          - Key: Name
            Value: mandarino-series-table

    SeriesContentsTableV2:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: seriesId
            AttributeType: S
        GlobalSecondaryIndexes:
          - IndexName: bySeriesId
            KeySchema:
              - AttributeName: seriesId
                KeyType: HASH
              - AttributeName: id
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        Tags:
          # To keep track of user table for diffeent environment
          - Key: Environment
            Value: ${self:custom.stage}
          - Key: Name
            Value: series-contents-table-v2
    ContentDetailsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
        GlobalSecondaryIndexes:
          - IndexName: bySk
            KeySchema:
              - AttributeName: sk
                KeyType: HASH
              - AttributeName: id
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        Tags:
          # To keep track of user table for diffeent environment
          - Key: Environment
            Value: ${self:custom.stage}
          - Key: Name
            Value: content-details-table

    EnrollmentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
          - AttributeName: seriesId
            AttributeType: S
        GlobalSecondaryIndexes:
          - IndexName: byUserId
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: id
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: byUserIdSeriesId
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: seriesId
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        Tags:
          - Key: Environment
            Value: ${self:custom.stage}
          - Key: Name
            Value: mandarino-enrollments-table
