service: nomad-method-v2
frameworkVersion: "3"

plugins:
  - serverless-iam-roles-per-function
  - serverless-step-functions

package:
  exclude:
    - package-lock.json
    - package.json

custom:
  name: vishal
  stage: ${opt:stage, self:provider.stage}
  logRetentionInDays: 30
  logLevel:
    default: ALL
    prod: ERROR

  appSyncLogLevel:
    default: ALL
    prod: ERROR

  ContentsTable:
    Name: ${cf:nomadmethod-api-${self:provider.stage}.ContentsTableName}
  CharactersTable:
    Name: ${cf:nomadmethod-api-${self:provider.stage}.CharactersTableName}
  ComponentsTable:
    Name: ${cf:nomadmethod-api-${self:provider.stage}.ComponentsTableName}
  UserCredentialsTable:
    Name: ${cf:nomadmethod-api-${self:provider.stage}.UserCredentialsTableName}
  MandarinoKMSKey:
    Arn: ${cf:nomadmethod-api-${self:provider.stage}.MandarinoKMSKeyArn}

  CognitoUserPool:
    Arn: ${cf:nomadmethod-api-${self:provider.stage}.CognitoUserPoolArn}
    Id: ${cf:nomadmethod-api-${self:provider.stage}.CognitoUserPoolId}
    ProviderName: ${cf:nomadmethod-api-${self:provider.stage}.CognitoUserPoolProviderName}

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  versionFunctions: false
  region: us-east-1
  memorySize: 512
  eventBridge:
    useCloudFormation: true
  environment:
    # kms_arn: !GetAtt ComposeKMSKey.Arn
    serviceName: ${self:service}
    stage: ${self:provider.stage}
    STAGE: ${self:provider.stage}
    LOG_LEVEL: ${self:custom.logLevel.${self:provider.stage}, self:custom.logLevel.default}
    USER_CREDENTIALS_TABLE: ${self:custom.UserCredentialsTable.Name}
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:Scan
        - dynamodb:PutItem
        - dynamodb:Query
        - dynamodb:GetItem
        - dynamodb:UpdateItem
        - dynamodb:ListTables
        - dynamodb:DeleteItem
        - dynamodb:BatchWriteItem
      Resource: "*"
    - Effect: Allow
      Action:
        - ApiGateway:*
      Resource: "*"
    - Effect: Allow
      Action:
        - cloudformation:ValidateTemplate
        - cloudformation:CreateStack
        - cloudformation:ListStackResources
        - cloudformation:DescribeStackResource
        - cloudformation:DescribeStacks
      Resource: "*"
      # Email
    - Effect: Allow
      Action: ses:SendEmail
      Resource: "*"
    - Effect: Allow
      Action: ssm:GetParameters
      Resource: "*"

    - Effect: Allow
      Action: events:*
      Resource: "*"
    - Effect: Allow
      Action:
        - s3:*
      Resource: "*"
    - Effect: Allow
      Action:
        - bedrock:InvokeModel
      Resource: "*"

functions:
  translate-text:
    timeout: 30
    handler: functions/translations/translate-text/translate-text.handler
    events:
      - http:
          path: /v1/translations/translate-text
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      CLIPBOARD_TRANSLATIONS_TABLE: !Ref ClipboardTranslationsTable
  detect-language:
