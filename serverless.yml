service: mandarino-content-api
frameworkVersion: "3"

plugins:
  - serverless-iam-roles-per-function
  - serverless-step-functions

package:
  exclude:
    - package-lock.json
    - package.json

custom:
  name: vishal
  stage: ${opt:stage, self:provider.stage}
  logRetentionInDays: 30
  logLevel:
    default: ALL
    prod: ERROR

  appSyncLogLevel:
    default: ALL
    prod: ERROR

  ContentsTable:
    Name: ${cf:nomadmethod-api-${self:provider.stage}.ContentsTableName}
  CognitoUserPool:
    Arn: ${cf:nomadmethod-api-${self:provider.stage}.CognitoUserPoolArn}
    Id: ${cf:nomadmethod-api-${self:provider.stage}.CognitoUserPoolId}
    ProviderName: ${cf:nomadmethod-api-${self:provider.stage}.CognitoUserPoolProviderName}

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  versionFunctions: false
  region: us-east-1
  memorySize: 512
  eventBridge:
    useCloudFormation: true
  environment:
    SERVICE_NAME: ${self:service}
    STAGE: ${self:provider.stage}
    LOG_LEVEL: ${self:custom.logLevel.${self:provider.stage}, self:custom.logLevel.default}
    USER_CREDENTIALS_TABLE: ${self:custom.UserCredentialsTable.Name}

functions:
  add-series:
    handler: functions/series/add-series.handler
    events:
      - http:
          path: /v1/add-series
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      SERIES_CONTENTS_TABLE: !Ref SeriesContentsTable
      LEGACY_CONTENTS_TABLE: ${self:custom.ContentsTable.Name}

  update-series:
    handler: functions/series/update-series.handler
    events:
      - http:
          path: /v1/update-series
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      SERIES_CONTENTS_TABLE: !Ref SeriesContentsTable
      LEGACY_CONTENTS_TABLE: ${self:custom.ContentsTable.Name}

  list-series:
    handler: functions/series/list-series.handler
    events:
      - http:
          path: /v1/list-series
          method: GET
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      LEGACY_CONTENTS_TABLE: ${self:custom.ContentsTable.Name}

  get-series-details:
    handler: functions/series/get-series-details.handler
    events:
      - http:
          path: /v1/series/{seriesId}
          method: GET
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      SERIES_CONTENTS_TABLE: !Ref SeriesContentsTable
      LEGACY_CONTENTS_TABLE: ${self:custom.ContentsTable.Name}

  add-episodes:
    handler: functions/series/add-episodes.handler
    events:
      - http:
          path: /v1/add-episodes
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      SERIES_CONTENTS_TABLE: !Ref SeriesContentsTable
      LEGACY_CONTENTS_TABLE: ${self:custom.ContentsTable.Name}

  remove-episodes:
    handler: functions/series/remove-episodes.handler
    events:
      - http:
          path: /v1/remove-episodes
          method: POST
          cors: true
          authorizer:
            name: CognitoAuthorizer
            type: COGNITO_USER_POOLS
            arn: ${self:custom.CognitoUserPool.Arn}
    environment:
      SERIES_TABLE: !Ref SeriesTable
      SERIES_CONTENTS_TABLE: !Ref SeriesContentsTable
      LEGACY_CONTENTS_TABLE: ${self:custom.ContentsTable.Name}

resources:
  Resources:
    SeriesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        GlobalSecondaryIndexes:
          - IndexName: byUserId
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: id
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        Tags:
          # To keep track of user table for diffeent environment
          - Key: Environment
            Value: ${self:custom.stage}
          - Key: Name
            Value: mandarino-series-table

    SeriesContentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
        GlobalSecondaryIndexes:
          - IndexName: bySk
            KeySchema:
              - AttributeName: sk
                KeyType: HASH
              - AttributeName: id
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        Tags:
          # To keep track of user table for diffeent environment
          - Key: Environment
            Value: ${self:custom.stage}
          - Key: Name
            Value: series-contents-table
    ContentDetailsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: sk
            AttributeType: S
        GlobalSecondaryIndexes:
          - IndexName: bySk
            KeySchema:
              - AttributeName: sk
                KeyType: HASH
              - AttributeName: id
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        Tags:
          # To keep track of user table for diffeent environment
          - Key: Environment
            Value: ${self:custom.stage}
          - Key: Name
            Value: content-details-table
